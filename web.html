<!DOCTYPE html>
<html>

<head>

    <title>To Do List</title>

    <link rel="stylesheet" href="web.css">

</head>

<body>

    <div class="main">


        <!-- prayer section -->

        <div class="prayer-box">

            <h2>Prayer 📿</h2>

            <div class="pray">

                <input type="checkbox">
                <label>Fajr</label>

            </div>

            <div class="pray">

                <input type="checkbox">
                <label>Dhuhr</label>

            </div>

            <div class="pray">

                <input type="checkbox">
                <label>Asr</label>

            </div>

            <div class="pray">

                <input type="checkbox">
                <label>Maghrib</label>

            </div>

            <div class="pray">

                <input type="checkbox">
                <label>Isha</label>

            </div>

        </div>



        <!-- to do list -->

        <div class="box">

            <h1>To Do List 🎀</h1>

            <p id="count">Tasks : 0</p>

            <input type="text" id="input" placeholder="Write task">

            <button id="btn">
                Add
            </button>

            <ul id="list">

            </ul>

        </div>

    </div>

    <script src="web.js"></script>

</body>

</html>
